name: CDP Validation

on:
  pull_request:
    paths:
      - 'Backend/src/cdp/**'
      - 'Backend/prisma/schema.prisma'
      - '.github/workflows/cdp-validation.yml'
  push:
    branches: [main, develop]
    paths:
      - 'Backend/src/cdp/**'
      - 'Backend/prisma/schema.prisma'
      - '.github/workflows/cdp-validation.yml'

defaults:
  run:
    working-directory: ./Backend

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "8"

jobs:
  # ─── CDP Schema Validation ───────────────────────────────────────
  schema-validation:
    name: CDP Schema Validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
          
      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
            
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Validate Prisma Schema
        run: npx prisma validate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        
      - name: Generate Prisma Client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        
      - name: Create CDP migrations
        run: pnpm db:migrate:create --name add_cdp_tables
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        
      - name: Deploy migrations
        run: pnpm db:migrate:deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

  # ─── CDP Unit Tests ─────────────────────────────────────────────
  cdp-unit-tests:
    name: CDP Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
          
      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
            
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Generate Prisma Client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
        
      - name: Deploy migrations
        run: pnpm db:migrate:deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        
      - name: Run CDP specific tests
        run: pnpm test -- --testPathPattern=cdp --coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          
      - name: Upload CDP coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./Backend/coverage/lcov.info
          flags: cdp
          name: cdp-coverage

  # ─── CDP Integration Tests ─────────────────────────────────────────
  cdp-integration-tests:
    name: CDP Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
          
      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
            
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Generate Prisma Client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
        
      - name: Deploy migrations
        run: pnpm db:migrate:deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        
      - name: Seed CDP test data
        run: |
          pnpm db:seed
          echo "Seeding CDP test data..."
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        
      - name: Build application
        run: pnpm build
        
      - name: Start application in background
        run: |
          pnpm start:prod &
          sleep 10
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          PORT: 3000
        
      - name: Wait for application to be ready
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:3000/health; do sleep 1; done'
        
      - name: Run CDP integration tests
        run: |
          # Test event ingestion
          curl -X POST http://localhost:3000/api/v1/cdp/events \
            -H "Content-Type: application/json" \
            -d '{
              "anonymousId": "test_anon_123",
              "type": "PAGE_VIEW",
              "source": "WEB",
              "eventName": "test_page_view",
              "properties": {"page": "/test"}
            }'
          
          # Test segment creation
          curl -X POST http://localhost:3000/api/v1/cdp/segments \
            -H "Content-Type: application/json" \
            -d '{
              "name": "Test Segment",
              "type": "VISUAL",
              "conditions": [{
                "field": "eventCount",
                "operator": "greater_than",
                "value": 0
              }]
            }'
          
          # Test segment listing
          curl -X GET http://localhost:3000/api/v1/cdp/segments

  # ─── CDP Performance Tests ─────────────────────────────────────────
  cdp-performance:
    name: CDP Performance Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
          
      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
            
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Install artillery for performance testing
        run: npm install -g artillery@latest
        
      - name: Generate Prisma Client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
        
      - name: Deploy migrations
        run: pnpm db:migrate:deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        
      - name: Seed performance test data
        run: |
          # Create test users and data for performance testing
          pnpm db:seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        
      - name: Build application
        run: pnpm build
        
      - name: Start application in background
        run: |
          pnpm start:prod &
          sleep 10
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          PORT: 3000
        
      - name: Wait for application to be ready
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:3000/health; do sleep 1; done'
        
      - name: Create performance test config
        run: |
          cat > artillery-config.yml << 'EOF'
          config:
            target: 'http://localhost:3000'
            phases:
              - duration: 60
                arrivalRate: 10
              - duration: 120
                arrivalRate: 50
              - duration: 60
                arrivalRate: 100
          scenarios:
            - name: "CDP Event Ingestion"
              weight: 70
              flow:
                - post:
                    url: "/api/v1/cdp/events"
                    json:
                      anonymousId: "perf_test_{{ $randomString() }}"
                      type: "PAGE_VIEW"
                      source: "WEB"
                      eventName: "performance_test"
                      properties:
                        test: true
                        timestamp: "{{ $timestamp }}"
            - name: "CDP Profile Queries"
              weight: 20
              flow:
                - get:
                    url: "/api/v1/cdp/users/test_user_{{ $randomInt(1, 100) }}/profile"
            - name: "CDP Segment Queries"
              weight: 10
              flow:
                - get:
                    url: "/api/v1/cdp/segments"
          EOF
        
      - name: Run performance tests
        run: artillery run artillery-config.yml
        
      - name: Upload performance results
        uses: actions/upload-artifact@v3
        with:
          name: cdp-performance-results
          path: artillery-report.html

  # ─── GDPR Compliance Tests ─────────────────────────────────────────
  gdpr-compliance:
    name: GDPR Compliance Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
          
      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
            
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Generate Prisma Client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
        
      - name: Deploy migrations
        run: pnpm db:migrate:deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        
      - name: Build application
        run: pnpm build
        
      - name: Start application in background
        run: |
          pnpm start:prod &
          sleep 10
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          PORT: 3000
        
      - name: Wait for application to be ready
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:3000/health; do sleep 1; done'
        
      - name: Test GDPR consent tracking
        run: |
          # Test consent update
          CONSENT_RESPONSE=$(curl -s -X POST http://localhost:3000/api/v1/cdp/users/test_user/consent \
            -H "Content-Type: application/json" \
            -d '{
              "type": "MARKETING",
              "granted": true,
              "channel": "email"
            }')
          
          echo "Consent response: $CONSENT_RESPONSE"
          
          # Test consent retrieval
          CONSENT_GET=$(curl -s -X GET http://localhost:3000/api/v1/cdp/users/test_user/consent)
          echo "Retrieved consent: $CONSENT_GET"
          
          # Test consent revocation
          REVOKE_RESPONSE=$(curl -s -X POST http://localhost:3000/api/v1/cdp/users/test_user/consent \
            -H "Content-Type: application/json" \
            -d '{
              "type": "MARKETING",
              "granted": false,
              "channel": "email"
            }')
          
          echo "Revoke response: $REVOKE_RESPONSE"
        
      - name: Test GDPR data export
        run: |
          # Test data export functionality
          EXPORT_RESPONSE=$(curl -s -X GET http://localhost:3000/api/v1/cdp/users/test_user/export)
          echo "Export response: $EXPORT_RESPONSE"
        
      - name: Test GDPR data deletion
        run: |
          # Test data deletion functionality
          DELETE_RESPONSE=$(curl -s -X DELETE http://localhost:3000/api/v1/cdp/users/test_user/data)
          echo "Delete response: $DELETE_RESPONSE"
