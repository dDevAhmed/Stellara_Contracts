name: Deploy CDP

on:
  push:
    branches: [main]
    paths:
      - 'Backend/src/cdp/**'
      - 'Backend/prisma/schema.prisma'
      - '.github/workflows/deploy-cdp.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]
      run_migrations:
        description: "Run database migrations"
        required: false
        default: true
        type: boolean

defaults:
  run:
    working-directory: ./Backend

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "8"

jobs:
  # ─── Build and Test ───────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
          
      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
            
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Generate Prisma Client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
        
      - name: Deploy migrations
        run: pnpm db:migrate:deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        
      - name: Run tests
        run: pnpm test -- --testPathPattern=cdp
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
        
      - name: Build application
        run: pnpm build
        
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: cdp-build
          path: |
            Backend/dist/
            Backend/prisma/
          retention-days: 7

  # ─── Deploy to Staging ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment: staging
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: cdp-build
          path: Backend/
          
      - name: Setup deployment environment
        run: |
          echo "Setting up staging environment variables"
          echo "DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }}" >> $GITHUB_ENV
          echo "REDIS_URL=${{ secrets.STAGING_REDIS_URL }}" >> $GITHUB_ENV
          echo "NODE_ENV=staging" >> $GITHUB_ENV
          
      - name: Run database migrations
        if: ${{ github.event.inputs.run_migrations != 'false' }}
        run: |
          cd Backend
          npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          
      - name: Deploy application
        run: |
          echo "Deploying CDP to staging..."
          # Add your deployment commands here
          # For example: docker-compose up -d, kubectl apply, etc.
          
      - name: Health check
        run: |
          echo "Performing health check..."
          # Add health check commands here
          # For example: curl -f $STAGING_URL/health

  # ─── Deploy to Production ───────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: build-and-test
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' && 
      (github.event.inputs.environment == 'production' || github.event_name == 'workflow_dispatch')
    environment: production
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: cdp-build
          path: Backend/
          
      - name: Setup deployment environment
        run: |
          echo "Setting up production environment variables"
          echo "DATABASE_URL=${{ secrets.PRODUCTION_DATABASE_URL }}" >> $GITHUB_ENV
          echo "REDIS_URL=${{ secrets.PRODUCTION_REDIS_URL }}" >> $GITHUB_ENV
          echo "NODE_ENV=production" >> $GITHUB_ENV
          
      - name: Create backup before deployment
        run: |
          echo "Creating database backup..."
          # Add backup commands here
          
      - name: Run database migrations
        if: ${{ github.event.inputs.run_migrations != 'false' }}
        run: |
          cd Backend
          npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          
      - name: Deploy application (Blue-Green)
        run: |
          echo "Deploying CDP to production using blue-green strategy..."
          # Add blue-green deployment commands here
          
      - name: Health check
        run: |
          echo "Performing production health check..."
          # Add production health check commands here
          
      - name: Smoke tests
        run: |
          echo "Running smoke tests..."
          # Add smoke test commands here
          
      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed, rolling back..."
          # Add rollback commands here

  # ─── Post-Deployment Verification ───────────────────────────────────
  verify-deployment:
    name: Verify Deployment
    needs: [deploy-staging, deploy-production]
    runs-on: ubuntu-latest
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify CDP endpoints
        run: |
          echo "Verifying CDP API endpoints..."
          # Add endpoint verification commands here
          
      - name: Test CDP functionality
        run: |
          echo "Testing CDP core functionality..."
          # Add functionality tests here
          
      - name: Check monitoring
        run: |
          echo "Checking monitoring and alerting..."
          # Add monitoring checks here
          
      - name: Notify team
        if: success()
        run: |
          echo "CDP deployment completed successfully!"
          # Add notification commands here (Slack, email, etc.)
